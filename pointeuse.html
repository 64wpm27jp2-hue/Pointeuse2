<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pointeuse Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#09090b;color:#fff;font-family:'DM Mono','Courier New',monospace;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#3f3f46;border-radius:4px}

/* Header */
header{position:sticky;top:0;z-index:10;background:rgba(9,9,11,.9);backdrop-filter:blur(12px);border-bottom:1px solid rgba(63,63,70,.6);padding:12px 16px}
.header-inner{max-width:672px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.header-title{font-family:Georgia,serif;font-size:18px;font-weight:700;letter-spacing:-.02em}
.header-sub{color:#71717a;font-size:12px;margin-top:2px}
.clock{font-size:24px;font-weight:700;tabular-nums;letter-spacing:-.02em;text-align:right}
.clock-sec{color:#52525b}
.clock-date{color:#71717a;font-size:12px;margin-top:2px}

/* Nav */
nav{position:sticky;top:65px;z-index:9;background:rgba(9,9,11,.95);border-bottom:1px solid rgba(63,63,70,.6)}
.nav-inner{max-width:672px;margin:0 auto;display:flex}
.tab-btn{flex:1;padding:12px 4px;background:none;border:none;cursor:pointer;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;font-family:inherit;color:#71717a;border-bottom:2px solid transparent;transition:all .2s}
.tab-btn.active{color:#fff;border-bottom-color:#34d399}
.tab-btn:hover:not(.active){color:#a1a1aa}

/* Main */
main{max-width:672px;margin:0 auto;padding:24px 16px}
.tab-content{display:none;flex-direction:column;gap:20px}
.tab-content.active{display:flex}
.space-y{display:flex;flex-direction:column;gap:12px}

/* Cards */
.card{background:#18181b;border:1px solid #27272a;border-radius:16px;padding:20px}
.card-p{background:#18181b;border:1px solid #27272a;border-radius:16px;padding:16px}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-size:12px;font-weight:600;border:1px solid}
.badge-green{background:rgba(16,185,129,.2);color:#6ee7b7;border-color:rgba(16,185,129,.3)}
.badge-yellow{background:rgba(245,158,11,.2);color:#fcd34d;border-color:rgba(245,158,11,.3)}
.badge-red{background:rgba(239,68,68,.2);color:#fca5a5;border-color:rgba(239,68,68,.3)}
.badge-blue{background:rgba(14,165,233,.2);color:#7dd3fc;border-color:rgba(14,165,233,.3)}
.badge-gray{background:rgba(63,63,70,.4);color:#a1a1aa;border-color:rgba(63,63,70,.3)}

/* StatCard */
.stat-card{position:relative;overflow:hidden;border-radius:16px;background:#18181b;border:1px solid #27272a;padding:20px}
.stat-card-bar{position:absolute;top:0;left:0;height:4px;width:100%}
.stat-card-label{color:#71717a;font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.stat-card-val{font-size:24px;font-weight:700;font-family:'DM Mono',monospace;color:#fff}
.stat-card-sub{color:#71717a;font-size:12px;margin-top:4px}

/* Progress bar */
.prog-bar{width:100%;border-radius:9999px;overflow:hidden}
.prog-bar-3{height:12px;background:#27272a}
.prog-bar-6{height:6px;background:#27272a}
.prog-bar-2{height:8px;background:#27272a}
.prog-fill{height:100%;border-radius:9999px;transition:width 1s linear}

/* Chrono */
.chrono{font-family:Georgia,serif;font-size:48px;font-weight:700;tabular-nums;text-align:center;transition:transform .15s}
.chrono.pulse{transform:scale(1.05)}

/* Action buttons */
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.action-btn{padding:20px;border-radius:16px;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.1em;border:2px solid;cursor:pointer;font-family:inherit;transition:all .2s;background:none}
.action-btn:disabled{cursor:not-allowed;border-color:#3f3f46;color:#52525b}
.action-btn-green:not(:disabled){border-color:#22c55e;color:#4ade80}
.action-btn-green:not(:disabled):hover{background:#22c55e;color:#18181b}
.action-btn-green:not(:disabled):active{transform:scale(.95)}
.action-btn-red:not(:disabled){border-color:#ef4444;color:#f87171}
.action-btn-red:not(:disabled):hover{background:#ef4444;color:#fff}
.action-btn-red:not(:disabled):active{transform:scale(.95)}

/* Horaires row */
.horaires-row{display:flex;justify-content:space-around;padding-top:8px;font-size:14px}
.horaire-box{text-align:center}
.horaire-label{color:#71717a;font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.horaire-val{font-weight:700;font-size:20px}
.sep{width:1px;background:#27272a}

/* Stats grid */
.stats-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}

/* Reset btn */
.reset-btn{width:100%;padding:8px;font-size:12px;color:#52525b;background:none;border:none;cursor:pointer;font-family:inherit;transition:color .2s}
.reset-btn:hover{color:#f87171}

/* Historique entry */
.hist-entry{background:#18181b;border:1px solid #27272a;border-radius:16px;padding:16px}
.hist-entry-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.hist-date{font-weight:600;text-transform:capitalize}
.hist-date-sub{color:#71717a;font-size:12px;margin-top:2px}
.hist-right{text-align:right}
.hist-hours{font-weight:700;font-family:'DM Mono',monospace;font-size:18px}
.hist-meta{display:flex;gap:16px;font-size:12px;color:#71717a;margin-top:4px}

/* Récap */
.recap-week{background:#18181b;border:1px solid #27272a;border-radius:16px;padding:20px}
.mini-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;font-size:12px}
.mini-cell{border-radius:12px;padding:8px}
.mini-cell-gray{background:rgba(39,39,42,.6)}
.mini-cell-amber{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2)}
.mini-cell-rose{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.2)}

/* Settings */
.setting-card{background:#18181b;border:1px solid #27272a;border-radius:16px;padding:16px}
.setting-label{display:block;color:#a1a1aa;font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.setting-input{width:100%;background:#27272a;border:1px solid #3f3f46;border-radius:12px;padding:12px 16px;color:#fff;font-family:'DM Mono',monospace;font-size:14px;outline:none;transition:border-color .2s}
.setting-input:focus{border-color:#34d399}
.data-card{background:#18181b;border:1px solid #27272a;border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:12px}
.data-label{color:#a1a1aa;font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.data-btn{width:100%;padding:12px;border-radius:12px;font-size:14px;cursor:pointer;font-family:inherit;background:none;transition:background .2s}
.data-btn-red{border:1px solid rgba(239,68,68,.4);color:#f87171}
.data-btn-red:hover{background:rgba(239,68,68,.1)}
.data-btn-blue{border:1px solid rgba(14,165,233,.4);color:#7dd3fc}
.data-btn-blue:hover{background:rgba(14,165,233,.1)}
.footer-note{background:rgba(24,24,27,.5);border:1px solid rgba(39,39,42,.5);border-radius:16px;padding:16px;text-align:center}
.footer-note p{color:#52525b;font-size:12px}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <h1 class="header-title">⏺ Pointeuse Pro</h1>
      <p class="header-sub" id="header-nom">Employé</p>
    </div>
    <div style="text-align:right">
      <div class="clock" id="clock-time">00:00<span class="clock-sec">:00</span></div>
      <p class="clock-date" id="clock-date"></p>
    </div>
  </div>
</header>

<nav>
  <div class="nav-inner">
    <button class="tab-btn active" data-tab="pointer" onclick="switchTab('pointer')"><span>⏱</span> Pointer</button>
    <button class="tab-btn" data-tab="historique" onclick="switchTab('historique')"><span>📋</span> Historique</button>
    <button class="tab-btn" data-tab="recap" onclick="switchTab('recap')"><span>📊</span> Récap</button>
    <button class="tab-btn" data-tab="reglages" onclick="switchTab('reglages')"><span>⚙️</span> Réglages</button>
  </div>
</nav>

<main>
  <div class="tab-content active" id="tab-pointer"></div>
  <div class="tab-content" id="tab-historique"></div>
  <div class="tab-content" id="tab-recap"></div>
  <div class="tab-content" id="tab-reglages"></div>
</main>

<script>
// ── Constants ──────────────────────────────────────────────────────────────────
const DEFAULT_SETTINGS = {
  heuresJour:7, heuresSemaine:35, tauxCompl:10, tauxSupp:25,
  pauseMinutes:30, nomEmploye:"Employé"
};
const STORAGE_KEY = "pointeuse_v1";

// ── State ──────────────────────────────────────────────────────────────────────
let appData = loadData();
let currentTab = "pointer";
let now = new Date();
let pulse = false;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { entries:{}, settings:{...DEFAULT_SETTINGS} };
    return JSON.parse(raw);
  } catch { return { entries:{}, settings:{...DEFAULT_SETTINGS} }; }
}
function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }
function cfg() { return {...DEFAULT_SETTINGS, ...appData.settings}; }

// ── Helpers ────────────────────────────────────────────────────────────────────
function fmt2(n) { return String(Math.floor(Math.abs(n))).padStart(2,"0"); }
function fmtHM(totalMinutes) {
  const h=Math.floor(Math.abs(totalMinutes)/60), m=Math.abs(totalMinutes)%60;
  return `${totalMinutes<0?"-":""}${fmt2(h)}h${fmt2(m)}`;
}
function fmtTime(date) { return date?`${fmt2(date.getHours())}:${fmt2(date.getMinutes())}`:"--:--"; }
function fmtDate(date) {
  return date?date.toLocaleDateString("fr-FR",{weekday:"long",year:"numeric",month:"long",day:"numeric"}):"";
}
function dayKey(date) { return date.toISOString().slice(0,10); }
function minutesBetween(a,b) { return Math.round((b-a)/60000); }

function calcDay(entry, settings) {
  if (!entry.entree||!entry.sortie) return null;
  const entree=new Date(entry.entree), sortie=new Date(entry.sortie);
  let worked=minutesBetween(entree,sortie)-(entry.pauseMinutes??settings.pauseMinutes);
  if(worked<0) worked=0;
  const normal=settings.heuresJour*60;
  const suppl=Math.max(0,worked-normal);
  return {worked, normal:Math.min(worked,normal), compl:0, suppl, manquant:Math.max(0,normal-worked)};
}

// ── Clock ──────────────────────────────────────────────────────────────────────
function updateClock() {
  now = new Date();
  document.getElementById('clock-time').innerHTML =
    `${fmt2(now.getHours())}:${fmt2(now.getMinutes())}<span class="clock-sec">:${fmt2(now.getSeconds())}</span>`;
  document.getElementById('clock-date').textContent = fmtDate(now);
  document.getElementById('header-nom').textContent = cfg().nomEmploye;

  // Live update pointer tab
  if (currentTab==='pointer') renderPointer();
}
setInterval(updateClock, 1000);
updateClock();

// ── Tab switching ──────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active',c.id==='tab-'+tab));
  render();
}

// ── Actions ────────────────────────────────────────────────────────────────────
function handleEntree() {
  const today=dayKey(now);
  const entry=appData.entries[today]||{};
  if(entry.entree) return;
  appData.entries[today]={entree:now.toISOString(),sortie:null,pauseMinutes:cfg().pauseMinutes};
  saveData(); render();
}
function handleSortie() {
  const today=dayKey(now);
  const entry=appData.entries[today]||{};
  if(!entry.entree||entry.sortie) return;
  appData.entries[today]={...entry,sortie:now.toISOString()};
  saveData(); render();
}
function handleReset() {
  if(!window.confirm("Réinitialiser la journée ?")) return;
  const today=dayKey(now);
  const e={...appData.entries}; delete e[today];
  appData.entries=e;
  saveData(); render();
}
function clearAll() {
  if(!window.confirm("Supprimer TOUT l'historique ? Cette action est irréversible.")) return;
  appData.entries={};
  saveData(); render();
}
function exportData() {
  const json=JSON.stringify(appData,null,2);
  const blob=new Blob([json],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`pointeuse_export_${dayKey(now)}.json`; a.click();
}
function updateSetting(key,val) {
  if(!appData.settings) appData.settings={};
  appData.settings[key]=val;
  saveData();
}

// ── Render Pointer ─────────────────────────────────────────────────────────────
function renderPointer() {
  const settings=cfg();
  const today=dayKey(now);
  const todayEntry=appData.entries[today]||{};
  const isPointed=!!todayEntry.entree;
  const isSorted=!!todayEntry.sortie;
  const isActive=isPointed&&!isSorted;
  const limitMinutes=settings.heuresJour*60;

  let liveWorked=0;
  if(isActive) {
    liveWorked=minutesBetween(new Date(todayEntry.entree),now)-(todayEntry.pauseMinutes??settings.pauseMinutes);
  } else if(todayEntry.sortie) {
    liveWorked=minutesBetween(new Date(todayEntry.entree),new Date(todayEntry.sortie))-(todayEntry.pauseMinutes??settings.pauseMinutes);
  }
  const progressPct=Math.min(100,(liveWorked/limitMinutes)*100);
  const progColor=progressPct>=100?"#34d399":progressPct>=75?"#fbbf24":"#38bdf8";

  const badges=`<div style="display:flex;justify-content:center;gap:8px;margin-bottom:16px">
    ${!isPointed?'<span class="badge badge-gray">Non pointé</span>':''}
    ${isActive?'<span class="badge badge-green">En service</span>':''}
    ${isSorted?'<span class="badge badge-blue">Journée terminée</span>':''}
  </div>`;

  const quickStats=isPointed?(()=>{
    const suppl=liveWorked>limitMinutes?liveWorked-limitMinutes:0;
    const manq=liveWorked<limitMinutes?limitMinutes-liveWorked:0;
    return `<div class="stats-grid-3">
      <div class="stat-card"><div class="stat-card-bar" style="background:#38bdf8"></div><p class="stat-card-label">Heures norm.</p><p class="stat-card-val" style="font-size:18px">${fmtHM(Math.min(liveWorked,limitMinutes))}</p></div>
      <div class="stat-card"><div class="stat-card-bar" style="background:#fbbf24"></div><p class="stat-card-label">Supp.</p><p class="stat-card-val" style="font-size:18px">${fmtHM(suppl)}</p></div>
      <div class="stat-card"><div class="stat-card-bar" style="background:#fb7185"></div><p class="stat-card-label">Manquantes</p><p class="stat-card-val" style="font-size:18px">${fmtHM(manq)}</p></div>
    </div>`;
  })():'';

  // ── Total du mois ──────────────────────────────────────────────────────────
  const currentMonthKey = now.toISOString().slice(0,7);
  const monthEntries = Object.keys(appData.entries).filter(k => k.startsWith(currentMonthKey));
  let mWorked=0, mSuppl=0, mManq=0, mJours=0;
  monthEntries.forEach(k => {
    const d = calcDay(appData.entries[k], settings);
    if (!d) return;
    mJours++;
    mWorked += d.worked;
    mSuppl  += Math.max(0, d.worked - limitMinutes);
    mManq   += Math.max(0, limitMinutes - d.worked);
  });
  // Jours ouvrés du mois
  const y=now.getFullYear(), m=now.getMonth();
  const daysInMonth=new Date(y,m+1,0).getDate();
  let joursOuvres=0;
  for(let d=1;d<=daysInMonth;d++){const wd=new Date(y,m,d).getDay();if(wd!==0&&wd!==6)joursOuvres++;}
  const pctMois=Math.min(100,(mJours/joursOuvres)*100);
  const nomMois=now.toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
  const monthCard = `
    <div style="background:linear-gradient(135deg,#18181b 60%,rgba(52,211,153,.06));border:1px solid #27272a;border-radius:16px;padding:20px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
        <div>
          <p style="color:#71717a;font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px">Total du mois</p>
          <p style="font-family:Georgia,serif;font-size:17px;font-weight:700;text-transform:capitalize">${nomMois}</p>
          <p style="color:#71717a;font-size:11px;margin-top:3px">${mJours} jour${mJours>1?"s":""} / ${joursOuvres} ouvrés</p>
        </div>
        <div style="text-align:right">
          <p style="font-size:28px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;color:#34d399">${fmtHM(mWorked)}</p>
          <p style="color:#71717a;font-size:11px;margin-top:3px">travaillées</p>
        </div>
      </div>
      <div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px">
          <span style="color:#71717a;font-size:11px">Progression</span>
          <span style="color:#34d399;font-size:11px;font-weight:700">${Math.round(pctMois)}%</span>
        </div>
        <div class="prog-bar prog-bar-6">
          <div class="prog-fill" style="width:${pctMois}%;background:linear-gradient(90deg,#38bdf8,#34d399)"></div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">
        <div style="background:#27272a;border-radius:10px;padding:10px 6px">
          <p style="color:#71717a;font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">Moy./jour</p>
          <p style="font-weight:700;font-family:'DM Mono',monospace;font-size:13px;color:#fff">${mJours>0?fmtHM(Math.round(mWorked/mJours)):"--"}</p>
        </div>
        <div style="background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);border-radius:10px;padding:10px 6px">
          <p style="color:#fbbf24;font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">Supp.</p>
          <p style="font-weight:700;font-family:'DM Mono',monospace;font-size:13px;color:#fcd34d">${fmtHM(mSuppl)}</p>
        </div>
        <div style="background:rgba(251,113,133,.08);border:1px solid rgba(251,113,133,.2);border-radius:10px;padding:10px 6px">
          <p style="color:#fb7185;font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">Manq.</p>
          <p style="font-weight:700;font-family:'DM Mono',monospace;font-size:13px;color:#fca5a5">${fmtHM(mManq)}</p>
        </div>
      </div>
    </div>`;

  document.getElementById('tab-pointer').innerHTML = `
    <div class="card" style="text-align:center">
      ${badges}
      <div class="chrono" id="chrono">${fmtHM(Math.max(0,liveWorked))}</div>
      <p style="color:#71717a;font-size:14px;margin-top:8px;margin-bottom:16px">/ ${fmtHM(limitMinutes)} objectif</p>
      <div class="prog-bar prog-bar-3" style="margin-bottom:24px">
        <div class="prog-fill" style="width:${progressPct}%;background:${progColor}"></div>
      </div>
      <div class="horaires-row">
        <div class="horaire-box">
          <p class="horaire-label">Entrée</p>
          <p class="horaire-val" style="color:${isPointed?'#34d399':'#52525b'}">${fmtTime(todayEntry.entree?new Date(todayEntry.entree):null)}</p>
        </div>
        <div class="sep"></div>
        <div class="horaire-box">
          <p class="horaire-label">Sortie</p>
          <p class="horaire-val" style="color:${isSorted?'#f87171':'#52525b'}">${fmtTime(todayEntry.sortie?new Date(todayEntry.sortie):null)}</p>
        </div>
        <div class="sep"></div>
        <div class="horaire-box">
          <p class="horaire-label">Pause</p>
          <p class="horaire-val" style="color:#a1a1aa">${todayEntry.pauseMinutes??settings.pauseMinutes}min</p>
        </div>
      </div>
    </div>
    <div class="action-grid">
      <button class="action-btn action-btn-green" onclick="handleEntree()" ${isPointed?'disabled':''}>▶ Arrivée</button>
      <button class="action-btn action-btn-red" onclick="handleSortie()" ${!isActive?'disabled':''}>■ Départ</button>
    </div>
    ${quickStats}
    ${isPointed?`<button class="reset-btn" onclick="handleReset()">✕ Réinitialiser la journée</button>`:''}
    ${monthCard}
  `;
}

// ── Render Historique ──────────────────────────────────────────────────────────
function renderHistorique() {
  const settings=cfg();
  const limitMinutes=settings.heuresJour*60;
  const sortedDays=Object.keys(appData.entries).sort((a,b)=>b.localeCompare(a));

  if(sortedDays.length===0){
    document.getElementById('tab-historique').innerHTML=`<div style="text-align:center;padding:64px;color:#52525b">Aucun pointage enregistré</div>`;
    return;
  }

  document.getElementById('tab-historique').innerHTML=`<div class="space-y">${sortedDays.map(k=>{
    const e=appData.entries[k];
    const d=calcDay(e,settings);
    const worked=d?d.worked:0;
    const suppl=Math.max(0,worked-limitMinutes);
    const manq=Math.max(0,limitMinutes-worked);
    const pct=Math.min(100,(worked/limitMinutes)*100);
    const dateObj=new Date(k+"T12:00:00");
    const progColor=pct>=100?"#34d399":"#38bdf8";
    return `<div class="hist-entry">
      <div class="hist-entry-header">
        <div>
          <p class="hist-date">${dateObj.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})}</p>
          <p class="hist-date-sub">${k}</p>
        </div>
        <div class="hist-right">
          <p class="hist-hours">${fmtHM(worked)}</p>
          ${suppl>0?`<span class="badge badge-yellow">+${fmtHM(suppl)} supp.</span>`:''}
          ${manq>0&&!e.sortie?`<span class="badge badge-gray">En cours</span>`:''}
          ${manq>0&&e.sortie?`<span class="badge badge-red">-${fmtHM(manq)}</span>`:''}
          ${manq===0&&suppl===0?`<span class="badge badge-green">Complet</span>`:''}
        </div>
      </div>
      <div class="prog-bar prog-bar-2" style="margin-bottom:12px">
        <div class="prog-fill" style="width:${pct}%;background:${progColor}"></div>
      </div>
      <div class="hist-meta">
        <span>▶ ${fmtTime(e.entree?new Date(e.entree):null)}</span>
        <span>■ ${fmtTime(e.sortie?new Date(e.sortie):null)}</span>
        <span>☕ ${e.pauseMinutes??settings.pauseMinutes}min</span>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ── Render Récap ───────────────────────────────────────────────────────────────
function renderRecap() {
  const settings=cfg();
  const sortedDays=Object.keys(appData.entries).sort((a,b)=>b.localeCompare(a));

  if(sortedDays.length===0){
    document.getElementById('tab-recap').innerHTML=`<div style="text-align:center;padding:64px;color:#52525b">Aucune donnée disponible</div>`;
    return;
  }

  const limitMinutes=settings.heuresJour*60;
  let totalWorked=0,totalNorm=0,totalSuppl=0,totalManq=0,jours=0;
  sortedDays.forEach(k=>{
    const d=calcDay(appData.entries[k],settings);
    if(!d) return;
    jours++;
    totalWorked+=d.worked;
    totalNorm+=Math.min(d.worked,limitMinutes);
    totalSuppl+=Math.max(0,d.worked-limitMinutes);
    totalManq+=Math.max(0,limitMinutes-d.worked);
  });

  const globalSection=`
    <div class="recap-week">
      <h2 style="color:#a1a1aa;font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px">Global (${jours} jours)</h2>
      <div class="grid2" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="stat-card"><div class="stat-card-bar" style="background:#38bdf8"></div><p class="stat-card-label">Total travaillé</p><p class="stat-card-val" style="font-size:20px">${fmtHM(totalWorked)}</p><p class="stat-card-sub">${jours} jours</p></div>
        <div class="stat-card"><div class="stat-card-bar" style="background:#34d399"></div><p class="stat-card-label">Heures norm.</p><p class="stat-card-val" style="font-size:20px">${fmtHM(totalNorm)}</p></div>
        <div class="stat-card"><div class="stat-card-bar" style="background:#fbbf24"></div><p class="stat-card-label">Heures supp.</p><p class="stat-card-val" style="font-size:20px">${fmtHM(totalSuppl)}</p><p class="stat-card-sub">Majoration ${settings.tauxSupp}%</p></div>
        <div class="stat-card"><div class="stat-card-bar" style="background:#fb7185"></div><p class="stat-card-label">Manquantes</p><p class="stat-card-val" style="font-size:20px">${fmtHM(totalManq)}</p></div>
      </div>
    </div>`;

  // Semaines
  const weekMap={};
  sortedDays.forEach(k=>{
    const d=new Date(k+"T12:00:00");
    const mon=new Date(d); mon.setDate(d.getDate()-((d.getDay()+6)%7));
    const wk=dayKey(mon);
    if(!weekMap[wk]) weekMap[wk]=[];
    weekMap[wk].push(appData.entries[k]);
  });

  const weeksHTML=Object.keys(weekMap).sort((a,b)=>b.localeCompare(a)).map(wk=>{
    const es=weekMap[wk];
    let tw=0;
    es.forEach(e=>{const d=calcDay(e,settings);if(d) tw+=d.worked;});
    const seuilMin=settings.heuresSemaine*60;
    const realOver=Math.max(0,tw-seuilMin);
    const compMin=Math.min(realOver,seuilMin);
    const suppMin=Math.max(0,realOver-seuilMin);
    const pct=Math.min(100,(tw/seuilMin)*100);
    const monDate=new Date(wk+"T12:00:00");
    const progColor=pct>=100?"#34d399":"#38bdf8";
    return `<div class="recap-week">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div>
          <h3 style="font-weight:600;font-size:14px">Semaine du ${monDate.toLocaleDateString("fr-FR",{day:"numeric",month:"long"})}</h3>
          <p style="color:#71717a;font-size:12px">${es.length} jour${es.length>1?"s":""} pointé${es.length>1?"s":""}</p>
        </div>
        <div style="text-align:right">
          <p style="font-weight:700;font-family:'DM Mono',monospace">${fmtHM(tw)}</p>
          <p style="color:#71717a;font-size:12px">/ ${fmtHM(seuilMin)}</p>
        </div>
      </div>
      <div class="prog-bar prog-bar-6" style="margin-bottom:16px"><div class="prog-fill" style="width:${pct}%;background:${progColor}"></div></div>
      <div class="mini-grid-3">
        <div class="mini-cell mini-cell-gray"><p style="color:#71717a">Normal</p><p style="font-weight:700;font-family:'DM Mono',monospace;color:#fff">${fmtHM(Math.min(tw,seuilMin))}</p></div>
        <div class="mini-cell mini-cell-amber"><p style="color:#fbbf24">Complémentaires</p><p style="font-weight:700;font-family:'DM Mono',monospace;color:#fcd34d">${fmtHM(compMin)}</p>${compMin>0?`<p style="color:#f59e0b;font-size:10px">+${settings.tauxCompl}%</p>`:''}</div>
        <div class="mini-cell mini-cell-rose"><p style="color:#fb7185">Supplémentaires</p><p style="font-weight:700;font-family:'DM Mono',monospace;color:#fca5a5">${fmtHM(suppMin)}</p>${suppMin>0?`<p style="color:#f43f5e;font-size:10px">+${settings.tauxSupp}%</p>`:''}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('tab-recap').innerHTML=globalSection+weeksHTML;
}

// ── Render Réglages ────────────────────────────────────────────────────────────
function renderReglages() {
  const settings=cfg();
  const fields=[
    {key:"nomEmploye",label:"Nom de l'employé",type:"text"},
    {key:"heuresJour",label:"Heures normales / jour",type:"number",min:1,max:12},
    {key:"heuresSemaine",label:"Seuil hebdomadaire (h)",type:"number",min:20,max:48},
    {key:"pauseMinutes",label:"Pause déjeuner (min)",type:"number",min:0,max:120},
    {key:"tauxCompl",label:"Majoration complémentaires (%)",type:"number",min:0,max:100},
    {key:"tauxSupp",label:"Majoration supplémentaires (%)",type:"number",min:0,max:100},
  ];

  const fieldsHTML=fields.map(f=>`
    <div class="setting-card">
      <label class="setting-label">${f.label}</label>
      <input class="setting-input" type="${f.type}" ${f.min!=null?`min="${f.min}"`:''}  ${f.max!=null?`max="${f.max}"`:''}
        value="${escHtml(String(settings[f.key]??DEFAULT_SETTINGS[f.key]))}"
        oninput="updateSetting('${f.key}',${f.type==='number'?'Number(this.value)':'this.value'})">
    </div>`).join('');

  document.getElementById('tab-reglages').innerHTML=`
    ${fieldsHTML}
    <div class="data-card">
      <p class="data-label">Données</p>
      <button class="data-btn data-btn-red" onclick="clearAll()">🗑 Effacer tout l'historique</button>
      <button class="data-btn data-btn-blue" onclick="exportData()">↓ Exporter les données (JSON)</button>
    </div>
    <div class="footer-note">
      <p>Les données sont sauvegardées localement dans votre navigateur.</p>
      <p style="color:#3f3f46;margin-top:4px">Pointeuse Pro v1.0</p>
    </div>`;
}

// ── Utils ──────────────────────────────────────────────────────────────────────
function escHtml(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render() {
  if(currentTab==='pointer') renderPointer();
  else if(currentTab==='historique') renderHistorique();
  else if(currentTab==='recap') renderRecap();
  else if(currentTab==='reglages') renderReglages();
}

render();
</script>
</body>
</html>
